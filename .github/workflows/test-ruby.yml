name: test-ruby

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - ruby/**
      - Makefile
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - ruby/**
      - Makefile
      - .github/**

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - run: bundle exec rubocop

  test-ruby:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        ruby: ['3.2', '3.3', '3.4', '4.0']
        include:
          - os: macos-latest
            ruby: '3.4'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec rake
        working-directory: ruby
