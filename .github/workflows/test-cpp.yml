name: test-cpp

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - cpp/**
      - Makefile
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - cpp/**
      - Makefile
      - .github/**

jobs:
  test-cpp:
    strategy:
      matrix:
        config:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
          - os: windows-latest
            cc: cl
      fail-fast: false
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        if: ${{ matrix.config.os == 'windows-latest'}}
      - name: Configure
        working-directory: cpp
        run: |
          cmake --preset host
      - name: Build
        working-directory: cpp
        run: |
          cmake --build --preset host
      - name: Build & Install (Unix)
        if: ${{ matrix.config.os != 'windows-latest' }}
        working-directory: cpp
        run: |
          sudo cmake --install build/host
      - name: Build & Install (Windows)
        if: ${{ matrix.config.os == 'windows-latest' }}
        working-directory: cpp
        run: |
          cmake --install build/host
