name: Release pub.dev

permissions: {}

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@21e68f4d54916e6c2f68f8c290b2aed9b02cbd3e #v1.7.2
    with:
      environment: 'Release'
      working-directory: dart
