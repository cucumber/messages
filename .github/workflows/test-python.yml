name: test-python

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - .pre-commit-config.yaml
      - python/**
      - Makefile
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - .pre-commit-config.yaml
      - python/**
      - Makefile
      - .github/**

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: 'ubuntu-latest', python-version: 'pypy3.11', toxenv: 'py' }
          - { os: 'ubuntu-latest', python-version: '3.13', toxenv: 'py' }
          # Running linting through latest Python
          - { os: 'ubuntu-latest', python-version: '3.14', toxenv: 'lint,py' }
          - { os: 'windows-latest', python-version: '3.14', toxenv: 'py' }
          - { os: 'macos-latest', python-version: '3.14', toxenv: 'py' }
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          version: "0.11.29"

      - name: Linting and testing
        run: |
          uv tool install tox --with tox-uv
          tox -e ${{ matrix.toxenv }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: python/coverage.xml

      - name: Build package
        run: uv build
