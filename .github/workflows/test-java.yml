name: test-java

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - java/**
      - Makefile
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - java/**
      - Makefile
      - .github/**

jobs:
  test-java:
    name: Java ${{ matrix.java }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
        java: ['21']
        include:
          - os: windows-latest
            java: '21'
          - os: macos-latest
            java: '21'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - run: mvn install javadoc:javadoc --batch-mode -D"style.color=always" --show-version
        working-directory: java
